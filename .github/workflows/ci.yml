name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Some decoder cross-validation tests transcode a fixture with ffmpeg; they skip cleanly if it's
      # absent, but install it on Linux so they actually run in CI. ffmpeg ships in the GitHub-hosted
      # Windows/macOS runner images already.
      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Restore
        run: dotnet restore MidiSharp.slnx

      - name: Build
        run: dotnet build MidiSharp.slnx -c Release --no-restore

      - name: Test
        run: dotnet test MidiSharp.slnx -c Release --no-build --verbosity normal
