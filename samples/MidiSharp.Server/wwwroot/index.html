<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MidiSharp Web Player</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, sans-serif; background: #15171c; color: #e6e6e6;
           margin: 0; display: flex; justify-content: center; min-height: 100dvh; }
    main { width: min(1280px, 95vw); height: 100dvh; box-sizing: border-box;
           padding: 1.4rem 0 1rem; display: flex; flex-direction: column; }
    /* App-shell: pickers stay up top, the analysis results scroll in the middle,
       and the transport + status stay put at the bottom so they're never pushed off-screen. */
    .top, .bottom { flex: 0 0 auto; }
    .mid { flex: 0 1 auto; min-height: 0; overflow-y: auto; padding-right: .3rem; }
    h1 { font-size: 1.3rem; font-weight: 600; }
    .sub { color: #8b93a1; font-size: .85rem; margin-top: -.5rem; }
    label { display: block; margin: 1rem 0 .3rem; font-size: .8rem; color: #9aa3b2;
            text-transform: uppercase; letter-spacing: .04em; }
    select { width: 100%; padding: .55rem .6rem; background: #1e2128; color: #e6e6e6;
             border: 1px solid #333a46; border-radius: 6px; font-size: .95rem; }
    .picker { width: 100%; text-align: left; padding: .6rem .7rem; background: #1e2128;
              color: #e6e6e6; border: 1px solid #333a46; border-radius: 6px; font-size: .95rem;
              cursor: pointer; font-weight: 400; }
    .picker.empty { color: #8b93a1; }
    .row { display: flex; align-items: center; gap: .6rem; margin-top: 1.2rem; }
    button { padding: .6rem 1.1rem; border: 0; border-radius: 6px; font-size: .95rem;
             cursor: pointer; font-weight: 600; }
    #analyze { background: #353b46; color: #e6e6e6; }
    #play { background: #3b82f6; color: #fff; }
    #stop { background: #353b46; color: #e6e6e6; }
    #exit { background: #5a2330; color: #f0c4cc; margin-left: auto; }
    button:disabled { opacity: .45; cursor: default; }
    #setupRow select { flex: 1 1 auto; width: auto; }
    #setupRow button { padding: .55rem .8rem; }
    #loadSetup, #delSetup { background: #353b46; color: #e6e6e6; }
    #saveSetup { background: #2f5d3b; color: #cdebd6; margin-left: auto; }
    #resetAll { background: #4a3320; color: #f0d4b0; margin-left: auto; padding: .55rem .8rem; }
    #status { margin-top: 1.6rem; padding: .9rem 1rem; background: #1a1d24; border-radius: 8px;
              border: 1px solid #2a2f3a; font-variant-numeric: tabular-nums; }
    .state { font-weight: 600; }
    .bar { height: 6px; background: #2a2f3a; border-radius: 3px; margin-top: .6rem; overflow: hidden; }
    .bar > i { display: block; height: 100%; width: 0; background: #3b82f6; transition: width .25s linear; }
    #defects { margin-top: 1rem; font-size: .82rem; color: #d8b56b; white-space: pre-wrap; line-height: 1.45;
               max-height: 22vh; overflow-y: auto; }
    #error { margin-top: 1rem; color: #f0808a; font-size: .9rem; }
    #patchHint { margin: 0; }
    /* Instrument overrides flow as a responsive grid of cards across the width. */
    #tracks, #patches { margin-top: .6rem; display: grid; align-items: start; gap: .6rem;
                        grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }
    .patch { padding: .6rem .7rem; border: 1px solid #23272f; border-radius: 8px; background: #181b21; }
    .patch .head { display: flex; gap: .5rem; align-items: baseline; }
    .patch .addr { color: #8b93a1; font-size: .78rem; font-variant-numeric: tabular-nums; min-width: 8.5rem; }
    .patch .name { font-size: .92rem; }
    .patch.drum .addr { color: #c8a76b; }
    .patch .ov { display: flex; gap: .4rem; flex-wrap: wrap; align-items: center; margin-top: .4rem; }
    .patch .srcbtn { flex: 1 1 12rem; text-align: left; padding: .35rem .5rem; font-size: .85rem;
                     font-weight: 400; background: #1e2128; color: #e6e6e6; border: 1px solid #333a46;
                     border-radius: 6px; cursor: pointer; }
    .patch .srcbtn.empty { color: #8b93a1; }
    .patch select { flex: 1 1 12rem; padding: .35rem .45rem; font-size: .85rem; }
    .patch .tag { font-size: .78rem; color: #6ee7a8; }
    .patch .clear { background: none; color: #8b93a1; font-weight: 400; font-size: .8rem; padding: .2rem .35rem; }
    /* track rows reuse .patch layout; the heading shows the instrument name + what it sounds today */
    .patch .track-name { font-size: .95rem; font-weight: 600; }
    .patch .track-sub { color: #8b93a1; font-size: .78rem; font-variant-numeric: tabular-nums; }
    .patch.silent { opacity: .5; }
    #tracks { margin-top: .6rem; }
    .patchSummary { cursor: pointer; color: #9aa3b2; font-size: .82rem; margin-top: 1.2rem; }

    /* File browser dialog */
    #browseBackdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55);
                      display: flex; align-items: center; justify-content: center; }
    #browseBackdrop[hidden] { display: none; }
    #browse { width: min(580px, 92vw); height: min(70vh, 560px); background: #1a1d24;
              border: 1px solid #333a46; border-radius: 10px; display: flex; flex-direction: column;
              overflow: hidden; }
    .bw-head { display: flex; align-items: center; gap: .5rem; padding: .7rem .8rem;
               border-bottom: 1px solid #2a2f3a; }
    .bw-crumbs { flex: 1; font-size: .8rem; color: #9aa3b2; overflow-x: auto; white-space: nowrap; }
    .bw-crumbs a { color: #7fb0ff; cursor: pointer; }
    .bw-crumbs .sep { color: #555c68; margin: 0 .15rem; }
    .bw-close { background: #353b46; color: #e6e6e6; padding: .25rem .55rem; }
    #bwFilter { margin: .6rem .8rem; padding: .45rem .55rem; background: #1e2128; color: #e6e6e6;
                border: 1px solid #333a46; border-radius: 6px; font-size: .9rem; }
    .bw-list { flex: 1; overflow-y: auto; padding: 0 .4rem .4rem; }
    .bw-row { display: flex; align-items: center; gap: .5rem; padding: .4rem .5rem; border-radius: 6px;
              cursor: pointer; font-size: .9rem; }
    .bw-row:hover { background: #222732; }
    .bw-row .ic { width: 1.2rem; text-align: center; }
    .bw-row.dir .nm { color: #cdd6e4; }
    .bw-status { padding: .4rem .9rem .7rem; font-size: .8rem; color: #8b93a1; }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <h1>MidiSharp Web Player</h1>
      <p class="sub">Audio plays on the server machine. The browser is the remote.</p>

      <label for="device">Output device</label>
      <select id="device"></select>

      <label>MIDI file</label>
      <button class="picker empty" id="midiPick" data-kind="midi">Choose a MIDI file…</button>

      <label>SoundFont (base)</label>
      <button class="picker empty" id="sfPick" data-kind="sf">Choose a base SoundFont…</button>

      <div class="row">
        <button id="analyze">Analyze</button>
        <span id="trackHint" class="sub"></span>
        <button id="resetAll" title="Revert every instrument in this song to the base font">Reset all</button>
      </div>

      <div class="row" id="setupRow">
        <select id="setupList"><option value="">— saved setups —</option></select>
        <button id="loadSetup">Load</button>
        <button id="delSetup">Delete</button>
        <button id="saveSetup">💾 Save Setup</button>
      </div>
    </div>

    <div class="mid">
      <div id="tracks"></div>

      <details id="patchWrap" hidden>
        <summary class="patchSummary">Advanced: override by patch (channel + program)</summary>
        <span id="patchHint" class="sub"></span>
        <div id="patches"></div>
      </details>
    </div>

    <div class="bottom">
      <div class="row">
        <button id="play">▶ Play</button>
        <button id="stop" disabled>■ Stop</button>
        <button id="exit">Exit server</button>
      </div>

      <div id="status">
        <span class="state" id="state">Idle</span>
        <span id="time"></span>
        <div class="bar"><i id="fill"></i></div>
      </div>
      <div id="error"></div>
      <div id="defects"></div>
    </div>
  </main>

  <div id="browseBackdrop" hidden>
    <div id="browse" role="dialog" aria-modal="true">
      <div class="bw-head">
        <div id="bwCrumbs" class="bw-crumbs"></div>
        <button id="bwClose" class="bw-close">✕</button>
      </div>
      <input id="bwFilter" placeholder="Filter this folder…" autocomplete="off" />
      <div id="bwList" class="bw-list"></div>
      <div id="bwStatus" class="bw-status"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
