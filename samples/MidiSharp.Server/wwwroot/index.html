<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MidiSharp Web Player</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, sans-serif; background: #15171c; color: #e6e6e6;
           margin: 0; display: flex; justify-content: center; min-height: 100dvh; }
    main { width: 98vw; max-width: 2800px; height: 100dvh; box-sizing: border-box;
           padding: 1rem 0; display: flex; flex-direction: row; gap: 1.1rem; }
    /* Two-pane: a fixed control sidebar on the left (transport pinned to its bottom),
       the instrument grid — and future mixer/EQ panels — scrolling on the right. */
    .side { flex: 0 0 320px; display: flex; flex-direction: column; min-height: 0;
            overflow-y: auto; padding-right: .4rem; border-right: 1px solid #23272f; }
    .side-foot { margin-top: auto; padding-top: 1rem; }
    .work { flex: 1 1 auto; min-width: 0; overflow-y: auto; padding-right: .3rem; }
    .work-head { display: flex; align-items: center; justify-content: space-between; gap: .6rem; }
    h1 { font-size: 1.3rem; font-weight: 600; }
    .sub { color: #8b93a1; font-size: .85rem; margin-top: -.5rem; }
    label { display: block; margin: 1rem 0 .3rem; font-size: .8rem; color: #9aa3b2;
            text-transform: uppercase; letter-spacing: .04em; }
    select { width: 100%; padding: .55rem .6rem; background: #1e2128; color: #e6e6e6;
             border: 1px solid #333a46; border-radius: 6px; font-size: .95rem; }
    #hostApi { margin-bottom: .4rem; }
    .picker { width: 100%; text-align: left; padding: .6rem .7rem; background: #1e2128;
              color: #e6e6e6; border: 1px solid #333a46; border-radius: 6px; font-size: .95rem;
              cursor: pointer; font-weight: 400; }
    .picker.empty { color: #8b93a1; }
    .row { display: flex; align-items: center; gap: .6rem; margin-top: 1.2rem; }
    button { padding: .6rem 1.1rem; border: 0; border-radius: 6px; font-size: .95rem;
             cursor: pointer; font-weight: 600; }
    #analyze { background: #353b46; color: #e6e6e6; }
    #play { background: #3b82f6; color: #fff; }
    #stop { background: #353b46; color: #e6e6e6; }
    #exit { background: #5a2330; color: #f0c4cc; margin-left: auto; }
    button:disabled { opacity: .45; cursor: default; }
    #setupRow { flex-wrap: wrap; }
    #setupRow select { flex: 1 1 100%; width: auto; }
    #setupRow button { padding: .5rem .7rem; }
    #loadSetup, #delSetup { background: #353b46; color: #e6e6e6; }
    #saveSetup { background: #2f5d3b; color: #cdebd6; margin-left: auto; }
    #resetAll { background: #4a3320; color: #f0d4b0; margin-left: auto; padding: .55rem .8rem; }
    #status { margin-top: 1.6rem; padding: .9rem 1rem; background: #1a1d24; border-radius: 8px;
              border: 1px solid #2a2f3a; font-variant-numeric: tabular-nums; }
    .state { font-weight: 600; }
    .bar { height: 6px; background: #2a2f3a; border-radius: 3px; margin-top: .6rem; overflow: hidden; }
    .bar > i { display: block; height: 100%; width: 0; background: #3b82f6; transition: width .25s linear; }
    #defects { margin-top: 1rem; font-size: .82rem; color: #d8b56b; white-space: pre-wrap; line-height: 1.45;
               max-height: 22vh; overflow-y: auto; }
    #error { margin-top: 1rem; color: #f0808a; font-size: .9rem; }
    #patchHint { margin: 0; }
    /* Instrument overrides flow as a responsive grid of cards across the width. */
    #tracks, #patches { margin-top: .6rem; display: grid; align-items: start; gap: .6rem;
                        grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }
    .patch { padding: .6rem .7rem; border: 1px solid #23272f; border-radius: 8px; background: #181b21; }
    .patch .head { display: flex; gap: .5rem; align-items: baseline; }
    .patch .addr { color: #8b93a1; font-size: .78rem; font-variant-numeric: tabular-nums; min-width: 8.5rem; }
    .patch .name { font-size: .92rem; }
    .patch.drum .addr { color: #c8a76b; }
    .patch .ov { display: flex; gap: .4rem; flex-wrap: wrap; align-items: center; margin-top: .4rem; }
    .patch .srcbtn { flex: 1 1 12rem; text-align: left; padding: .35rem .5rem; font-size: .85rem;
                     font-weight: 400; background: #1e2128; color: #e6e6e6; border: 1px solid #333a46;
                     border-radius: 6px; cursor: pointer; }
    .patch .srcbtn.empty { color: #8b93a1; }
    .patch select { flex: 1 1 12rem; padding: .35rem .45rem; font-size: .85rem; }
    .patch .tag { font-size: .78rem; color: #6ee7a8; }
    .patch .clear { background: none; color: #8b93a1; font-weight: 400; font-size: .8rem; padding: .2rem .35rem; }
    /* track rows reuse .patch layout; the heading shows the instrument name + what it sounds today */
    .patch .track-name { font-size: .95rem; font-weight: 600; }
    .patch .track-sub { color: #8b93a1; font-size: .78rem; font-variant-numeric: tabular-nums; }
    .patch.silent { opacity: .5; }
    #tracks { margin-top: .6rem; }
    .patchSummary { cursor: pointer; color: #9aa3b2; font-size: .82rem; margin-top: 1.2rem; }

    /* Mixer + master panel */
    #mixerWrap { margin-bottom: 1.1rem; border: 1px solid #23272f; border-radius: 8px;
                 background: #161920; padding: .5rem .7rem .7rem; }
    #mixerWrap > summary { cursor: pointer; list-style: none; display: flex; align-items: center;
                           justify-content: space-between; gap: .6rem; }
    #mixerWrap > summary::-webkit-details-marker { display: none; }
    #mixerWrap > summary label { margin: 0; }
    .master { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin: .7rem 0 .3rem;
              padding: .5rem .6rem; background: #1a1d24; border-radius: 6px; }
    .master .inline { display: flex; align-items: center; gap: .4rem; margin: 0; font-size: .85rem;
                      text-transform: none; letter-spacing: 0; color: #cdd6e4; cursor: pointer; }
    .master input[type=checkbox] { width: 1rem; height: 1rem; accent-color: #3b82f6; }
    .knob { display: flex; align-items: center; gap: .4rem; font-size: .76rem; color: #8b93a1; }
    .knob input[type=range] { accent-color: #3b82f6; }
    .knob .val { font-variant-numeric: tabular-nums; min-width: 3.4rem; color: #cdd6e4; font-size: .78rem; }
    /* Effect rack — draggable effect cards (master bus now; per-instrument inserts later) */
    .rack { display: flex; flex-direction: column; gap: .5rem; margin: .3rem 0 .2rem; }
    /* The master rack is a vertical chain; cap its width so cards don't stretch across the whole pane. */
    #masterRack { max-width: 1100px; }
    .fxcard { border: 1px solid #2a2f3a; border-radius: 8px; background: #1a1d24; overflow: hidden; }
    .fxcard.off { opacity: .55; }
    .fxcard.dragging { opacity: .4; }
    .fxcard.drop { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6 inset; }
    .fxhead { display: flex; align-items: center; gap: .5rem; padding: .4rem .55rem; background: #20242c; }
    .fxgrip { cursor: grab; color: #6b7280; font-size: 1rem; user-select: none; }
    .fxgrip:active { cursor: grabbing; }
    .fxtitle { flex: 1; font-size: .86rem; font-weight: 600; color: #e6e6e6; }
    .fxbtn { padding: .2rem .5rem; font-size: .76rem; font-weight: 600; background: #2a2f3a; color: #9aa3b2;
             border: 0; border-radius: 5px; cursor: pointer; }
    .fxbtn.en { min-width: 2.2rem; }
    .fxcard:not(.off) .fxbtn.en { background: #284a7a; color: #cfe0ff; }
    .fxbtn.rm:hover { background: #5a2330; color: #f0c4cc; }
    .fxbody { padding: .6rem .7rem; }
    .fxbody.collapsed { display: none; }
    .fxrow { display: flex; align-items: center; gap: 1.1rem; flex-wrap: wrap; }
    .fxadd select { width: auto; min-width: 11rem; padding: .35rem .5rem; font-size: .85rem; }
    .fxadd .hint { color: #6b7280; font-size: .8rem; }
    /* shared by the EQ widget body */
    .eq { display: flex; align-items: flex-end; gap: 1.2rem; padding-left: .2rem; }
    .eq.disabled { opacity: .4; pointer-events: none; }
    .eqband { display: flex; flex-direction: column; align-items: center; gap: .25rem; font-size: .72rem; }
    .eqband input[type=range] { writing-mode: vertical-lr; direction: rtl; width: 1.4rem; height: 84px;
                                accent-color: #3b82f6; }
    .eqband .g { font-variant-numeric: tabular-nums; color: #cdd6e4; min-width: 2.4rem; text-align: center; }
    .eqband .lbl { color: #8b93a1; }
    /* Mixer area: channel strips fill the left and wrap; the master strip is pinned on the right. */
    .mixer-area { display: flex; align-items: flex-start; gap: 1rem; margin-top: .5rem; }
    #mixer { flex: 1 1 auto; min-width: 0; display: flex; flex-wrap: wrap; align-items: flex-start; gap: .5rem; }
    #masterStrip { flex: 0 0 auto; }
    /* Vertical channel strips (console style) — narrow columns tiled across the width. */
    .vstrip.master { border-color: #34507e; background: #1b2230; }
    .vstrip.master .vname { color: #cfe0ff; }
    .vstrip .vhead button.solo-w { flex: 1; }
    /* Compact advanced per-track routing rows */
    #tracks { display: flex; flex-direction: column; gap: .3rem; margin-top: .5rem; }
    .trow { display: flex; align-items: center; justify-content: space-between; gap: .8rem;
            padding: .35rem .55rem; border: 1px solid #23272f; border-radius: 6px; background: #181b21; }
    .trow .tlabel { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: .85rem; }
    .trow .tsub { color: #8b93a1; font-size: .76rem; font-variant-numeric: tabular-nums; }
    .trow .ms { flex: 0 0 auto; }
    .vstrip { width: 124px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center;
              gap: .45rem; padding: .55rem .4rem .55rem; border: 1px solid #23272f; border-radius: 8px; background: #181b21; }
    .vstrip.drum { border-color: #3a3324; }
    .vstrip .vname { width: 100%; text-align: center; font-size: .8rem; font-weight: 600; line-height: 1.15;
                     overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .vstrip .vaddr { display: block; color: #8b93a1; font-size: .67rem; font-weight: 400; font-variant-numeric: tabular-nums; }
    /* Per-part activity meter: a thin bar under the name, filled left→right by note-on velocity (app.js). */
    .vstrip .vact { width: 100%; height: 5px; margin: 1px 0 2px; border-radius: 3px;
                    background: #11151c; box-shadow: inset 0 0 0 1px #2a313d; overflow: hidden; }
    .vstrip .vact-fill { height: 100%; width: 0;
                         background: linear-gradient(to right, #2f9e54 0%, #6ee7a8 55%, #e7d36e 78%, #e76e6e 100%); }
    .vstrip .vhead { display: flex; gap: .3rem; width: 100%; }
    .vstrip .vhead button { flex: 1; padding: .26rem 0; font-size: .72rem; font-weight: 600; cursor: pointer;
                            background: #2a2f3a; color: #9aa3b2; border: 0; border-radius: 5px; }
    .vstrip .vhead button.on { background: #284a7a; color: #cfe0ff; }
    .vstrip .vsend { display: flex; align-items: center; gap: .25rem; width: 100%; }
    .vstrip .vsend label { width: 1.7rem; margin: 0; padding: 0; text-transform: none; letter-spacing: 0;
                           font-size: .64rem; color: #8b93a1; }
    .vstrip .vsend input[type=range] { flex: 1; min-width: 0; accent-color: #3b82f6; }
    .vstrip .vsend .v { width: 1.9rem; text-align: right; font-size: .64rem; color: #cdd6e4; font-variant-numeric: tabular-nums; }
    .vstrip .vms { display: flex; gap: .3rem; }
    .vstrip .vms .ms { width: 1.8rem; padding: .2rem 0; font-size: .72rem; font-weight: 700; cursor: pointer;
                       background: #23272f; color: #9aa3b2; border: 0; border-radius: 5px; }
    .vstrip .vms .ms.on.mute { background: #5a2330; color: #f0c4cc; }
    .vstrip .vms .ms.on.solo { background: #2f5d3b; color: #cdebd6; }
    .vstrip .vfader { display: flex; flex-direction: column; align-items: center; gap: .2rem; margin-top: .15rem; }
    .vstrip .vfader input[type=range] { writing-mode: vertical-lr; direction: rtl; width: 1.7rem; height: 132px; accent-color: #3b82f6; }
    .vstrip .vgain { font-size: .72rem; font-variant-numeric: tabular-nums; color: #cdd6e4; }
    /* Master strip body: fader and the stereo output meter side by side. */
    .vstrip .vbody { display: flex; gap: .45rem; align-items: flex-start; margin-top: .15rem; }
    .vstrip .vbody .vfader { margin-top: 0; }
    /* Stereo master-output meter — two vertical bars driven by the status socket (see app.js). */
    .vstrip .vmeter { display: flex; gap: 3px; height: 132px; padding-top: 1px; }
    .vstrip .vmeter-ch { position: relative; width: 7px; height: 100%; border-radius: 3px;
                         background: #11151c; box-shadow: inset 0 0 0 1px #2a313d; overflow: hidden; }
    /* Fill grows from the bottom; the gradient gives the usual green→amber→red headroom cue. */
    .vstrip .vmeter-fill { position: absolute; left: 0; right: 0; bottom: 0; height: 0;
                           background: linear-gradient(to top, #2f9e54 0%, #6ee7a8 55%, #e7d36e 78%, #e76e6e 100%); }
    /* Peak-hold line, positioned by `bottom` from the rAF loop. */
    .vstrip .vmeter-peak { position: absolute; left: 0; right: 0; bottom: 0; height: 2px;
                           background: #fff; opacity: 0; transition: opacity .15s; }
    /* Floating popovers (source-font picker / FX insert rack) — anchored to the strip header buttons. */
    .pop { position: fixed; z-index: 100; display: none; background: #1a1d24; border: 1px solid #3a4250;
           border-radius: 8px; padding: .6rem; box-shadow: 0 10px 34px rgba(0,0,0,.55);
           overflow-y: auto; overscroll-behavior: contain; }
    .pop.pop-open { display: block; }
    .pop.src { width: 320px; }
    .pop.fxpop { width: 540px; }
    .pop .ov { display: flex; flex-direction: column; gap: .45rem; align-items: stretch; }
    .pop .srcbtn { text-align: left; padding: .4rem .55rem; font-size: .85rem; font-weight: 400; background: #1e2128;
                   color: #e6e6e6; border: 1px solid #333a46; border-radius: 6px; cursor: pointer; }
    .pop .srcbtn.empty { color: #8b93a1; }
    .pop select { width: 100%; padding: .4rem .45rem; font-size: .85rem; }
    .pop .tag { font-size: .8rem; color: #6ee7a8; }
    .pop .clear { align-self: flex-start; background: none; color: #8b93a1; font-weight: 400; font-size: .8rem;
                  padding: .2rem .35rem; border: 0; cursor: pointer; }
    .mixer-bar { display: flex; align-items: center; justify-content: space-between; gap: .6rem; margin: .6rem 0 .2rem; }
    #mixerHint { color: #8b93a1; font-size: .82rem; margin-top: .5rem; }

    /* File browser dialog */
    #browseBackdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55);
                      display: flex; align-items: center; justify-content: center; }
    #browseBackdrop[hidden] { display: none; }
    #browse { width: min(580px, 92vw); height: min(70vh, 560px); background: #1a1d24;
              border: 1px solid #333a46; border-radius: 10px; display: flex; flex-direction: column;
              overflow: hidden; }
    .bw-head { display: flex; align-items: center; gap: .5rem; padding: .7rem .8rem;
               border-bottom: 1px solid #2a2f3a; }
    .bw-crumbs { flex: 1; font-size: .8rem; color: #9aa3b2; overflow-x: auto; white-space: nowrap; }
    .bw-crumbs a { color: #7fb0ff; cursor: pointer; }
    .bw-crumbs .sep { color: #555c68; margin: 0 .15rem; }
    .bw-close { background: #353b46; color: #e6e6e6; padding: .25rem .55rem; }
    #bwFilter { margin: .6rem .8rem; padding: .45rem .55rem; background: #1e2128; color: #e6e6e6;
                border: 1px solid #333a46; border-radius: 6px; font-size: .9rem; }
    .bw-list { flex: 1; overflow-y: auto; padding: 0 .4rem .4rem; }
    .bw-row { display: flex; align-items: center; gap: .5rem; padding: .4rem .5rem; border-radius: 6px;
              cursor: pointer; font-size: .9rem; }
    .bw-row:hover { background: #222732; }
    .bw-row .ic { width: 1.2rem; text-align: center; }
    .bw-row.dir .nm { color: #cdd6e4; }
    .bw-status { padding: .4rem .9rem .7rem; font-size: .8rem; color: #8b93a1; }
  </style>
</head>
<body>
  <main>
    <aside class="side">
      <h1>MidiSharp Web Player</h1>
      <p class="sub">Audio plays on the server machine. The browser is the remote.</p>

      <label for="device">Output device</label>
      <select id="hostApi" hidden></select>
      <select id="device"></select>

      <label>MIDI file</label>
      <button class="picker empty" id="midiPick" data-kind="midi">Choose a MIDI file…</button>

      <label>SoundFont (base)</label>
      <button class="picker empty" id="sfPick" data-kind="sf">Choose a base SoundFont…</button>

      <div class="row">
        <button id="analyze">Analyze</button>
        <span id="trackHint" class="sub"></span>
      </div>

      <div class="row" id="setupRow">
        <select id="setupList"><option value="">— saved setups —</option></select>
        <button id="loadSetup">Load</button>
        <button id="delSetup">Delete</button>
        <button id="saveSetup">💾 Save Setup</button>
      </div>

      <div class="side-foot">
        <div class="row">
          <button id="play">▶ Play</button>
          <button id="stop" disabled>■ Stop</button>
        </div>

        <div id="status">
          <span class="state" id="state">Idle</span>
          <span id="time"></span>
          <div class="bar"><i id="fill"></i></div>
        </div>
        <div id="error"></div>
        <div id="defects"></div>

        <div class="row"><button id="exit">Exit server</button></div>
      </div>
    </aside>

    <section class="work">
      <details id="mixerWrap" open>
        <summary><label>Parts &amp; master</label>
          <span class="sub">one strip per track — source · mix · inserts, live</span></summary>
        <div class="mixer-bar">
          <span class="sub" id="mixerCount"></span>
          <button id="resetAll" title="Revert every program to the base font (clears all source overrides)">Reset all</button>
        </div>
        <div class="mixer-area">
          <div id="mixer"></div>
          <div id="masterStrip"></div>
        </div>
        <div id="mixerHint">Analyze a song to load its parts.</div>
      </details>
    </section>
  </main>

  <div id="browseBackdrop" hidden>
    <div id="browse" role="dialog" aria-modal="true">
      <div class="bw-head">
        <div id="bwCrumbs" class="bw-crumbs"></div>
        <button id="bwClose" class="bw-close">✕</button>
      </div>
      <input id="bwFilter" placeholder="Filter this folder…" autocomplete="off" />
      <div id="bwList" class="bw-list"></div>
      <div id="bwStatus" class="bw-status"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
